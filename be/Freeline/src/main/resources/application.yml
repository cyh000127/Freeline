spring:
  jpa:
    defer-datasource-initialization: true
    open-in-view: false # OSIV 비활성화 (팀 컨벤션 및 성능 최적화)
    hibernate:
      ddl-auto: update  # 자바 엔티티를 기준으로 DB 테이블을 자동 생성 및 수정

  # local 또는 live 활성화
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/freeline
    username: postgres
    password: root

  data:
    redis:
      host: localhost
      port: 6379

  # 파일 업로드 공통 설정
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

# JWT 및 암호화 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY}

# Swagger UI
springdoc:
  api-docs:
    groups:
      enabled: true
  swagger-ui:
    display-request-duration: true
    operations-sorter: alpha
    groups-order: asc
    tags-sorter: alpha
    disable-swagger-default-url: true
    try-it-out-enabled: true



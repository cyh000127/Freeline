spring:
  jackson:
    time-zone: Asia/Seoul
  rabbitmq:
    listener:
      simple:
        default-requeue-rejected: false
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false # OSIV 비활성화
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  sql:
    init:
      mode: always
      schema-locations: classpath:ddl.sql
      continue-on-error: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

springdoc:
  api-docs:
    groups:
      enabled: true
  swagger-ui:
    display-request-duration: true
    operations-sorter: alpha
    groups-order: asc
    tags-sorter: alpha
    disable-swagger-default-url: true
    try-it-out-enabled: true

cloudflare:
  endpoint: ${CLOUDFLARE_ENDPOINT:}
  bucket: ${CLOUDFLARE_BUCKET:}
  access-key: ${CLOUDFLARE_ACCESS_KEY:}
  secret-key: ${CLOUDFLARE_SECRET_KEY:}
  outer-prefix: ${CLOUDFLARE_OUTER_PREFIX:https://pub-2cb3d8449bed4f6bba7e7173f1ce3c8c.r2.dev/}

qr:
  booth-active-ttl-days: 30
  reissue-cooldown-seconds: 30
  scan-lock-seconds: 5

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}

app:
  database:
    reset-on-startup: false
  rabbitmq:
    waiting:
      exchange: waiting.events
      sse-queue: waiting.sse.queue
      fcm-queue: waiting.fcm.queue
      dead-letter-exchange: waiting.events.dlx
      sse-dead-letter-queue: waiting.sse.dlq
      fcm-dead-letter-queue: waiting.fcm.dlq
      fcm-delay-queue: waiting.fcm.delay.queue
      fcm-delayed-queue: waiting.fcm.delayed.queue
      sse-routing-key-pattern: waiting.sse.*
      fcm-routing-key-pattern: waiting.fcm.*
      fcm-delayed-routing-key: waiting.fcm.delayed
      consumer-max-attempts: 3 # 최대 재전송 횟수 제한
      fcm-consumer:
        concurrent-consumers: 4
        max-concurrent-consumers: 8
        prefetch-count: 5

hdfs:
  webhdfs-url: ${HDFS_WEBHDFS_URL:http://namenode:9870}
  hive-url: ${HDFS_HIVE_URL:jdbc:hive2://hive-server:10000/freeline}
  hive-user: ${HDFS_HIVE_USER:hive}
  hive-password: ${HDFS_HIVE_PASSWORD:hive}
  base-path: /data

booth-manager:
  sse:
    timeout-millis: 3600000

# Monitoring (Prometheus + Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: freeline-backend

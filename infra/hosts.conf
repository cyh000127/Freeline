# Infrastructure Host Mapping Configuration
# Each component maps to a deployment target.
# Use 'localhost' for local deployment (same server as Jenkins).
# Use 'user@IP' for remote deployment via SSH.
#
# Jenkins (Server B): localhost 컴포넌트는 Jenkins가 돌고있는 서버에서 직접 실행
# Server A (172.26.3.239): 원격 SSH 배포

# --- Server B (Infra Server, Jenkins가 여기서 실행) ---
networks=ubuntu@172.26.15.39
jenkins=ubuntu@172.26.15.39
infisical=ubuntu@172.26.15.39
monitoring=ubuntu@172.26.15.39
loadtest=ubuntu@172.26.15.39
hadoop=ubuntu@172.26.15.39

# --- Server A (Application Server, 원격 배포) ---
nginx=ubuntu@172.26.3.239
backend=ubuntu@172.26.3.239
frontend=ubuntu@172.26.3.239
jenkins-agent=ubuntu@172.26.3.239
monitoring-agent=ubuntu@172.26.3.239
flume-agent=ubuntu@172.26.3.239

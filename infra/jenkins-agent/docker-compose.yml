services:
  jenkins-agent:
    build:
      context: ./agent
      args:
        - DOCKER_GID=988
    image: freeline-jenkins-agent:latest
    container_name: jenkins-agent
    restart: always
    ports:
      - "2222:22"
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=ssh-rsa  ubuntu@ip-172-26-3-239
      - TZ=Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - infra-public

networks:
  infra-public:
    external: true

services:
  nginx:
    image: nginx:1.28.2-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    env_file:
      - ./upstream.env
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    networks:
      - infra-public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 컨테이너 시작 시 template에서 실제 conf 생성
    command: /bin/sh -c "envsubst '$$SERVER_NAME $$BACKEND_HOST $$BACKEND_PORT $$JENKINS_HOST $$JENKINS_PORT $$INFISICAL_HOST $$INFISICAL_PORT' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  infra-public:
    external: true

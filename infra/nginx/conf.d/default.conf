server {
    listen 80;
    listen [::]:80;
    server_name j14a207.p.ssafy.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name j14a207.p.ssafy.io;

    ssl_certificate /etc/letsencrypt/live/j14a207.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14a207.p.ssafy.io/privkey.pem;
    
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        return 404;
    }

    location /api/ {
        proxy_pass http://freeline-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://freeline-backend:8080/swagger-ui.html;
        proxy_set_header Host $host;
    }

    location /swagger-ui/ {
        proxy_pass http://freeline-backend:8080/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://freeline-backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }
    
    location /jenkins {
        proxy_pass http://jenkins:8080;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_request_buffering off;

        client_max_body_size 0;
        proxy_redirect http:// https://;
        add_header 'X-Content-Type-Options' 'nosniff' always;
    }
    
}


services:
  namenode:
    image: apache/hadoop:3.4.1
    container_name: hadoop-namenode
    hostname: namenode
    restart: always
    command: bash -c "sudo chown hadoop:hadoop /hadoop/dfs/name && if [ ! -f /hadoop/dfs/name/current/VERSION ]; then hdfs namenode -format -force -nonInteractive; fi && exec hdfs namenode"
    ports:
      - "9870:9870"
    environment:
      TZ: Asia/Seoul
      HADOOP_HOME: /opt/hadoop
    volumes:
      - hadoop-namenode-data:/hadoop/dfs/name
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./scripts/init-hdfs.sh:/scripts/init-hdfs.sh:ro
    networks:
      - infra-public
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/9870' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  datanode:
    image: apache/hadoop:3.4.1
    container_name: hadoop-datanode
    hostname: datanode
    restart: always
    command: bash -c "sudo chown hadoop:hadoop /hadoop/dfs/data && exec hdfs datanode"
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      HADOOP_HOME: /opt/hadoop
    volumes:
      - hadoop-datanode-data:/hadoop/dfs/data
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    networks:
      - infra-public
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/9864' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  resourcemanager:
    image: apache/hadoop:3.4.1
    container_name: hadoop-resourcemanager
    hostname: resourcemanager
    restart: always
    command: yarn resourcemanager
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      TZ: Asia/Seoul
      HADOOP_HOME: /opt/hadoop
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
    networks:
      - infra-public
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/8088' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nodemanager:
    image: apache/hadoop:3.4.1
    container_name: hadoop-nodemanager
    hostname: nodemanager
    restart: always
    command: yarn nodemanager
    depends_on:
      resourcemanager:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      HADOOP_HOME: /opt/hadoop
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
    networks:
      - infra-public
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/8042' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  hive-metastore-db:
    image: postgres:18.3-alpine
    container_name: hive-metastore-db
    restart: always
    environment:
      POSTGRES_DB: ${HIVE_METASTORE_DB_NAME:-hive_metastore}
      POSTGRES_USER: ${HIVE_METASTORE_DB_USER:-hive}
      POSTGRES_PASSWORD: ${HIVE_METASTORE_DB_PASSWORD:-hive}
      TZ: Asia/Seoul
    volumes:
      - hive-metastore-db-data:/var/lib/postgresql/data
    networks:
      - infra-public
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${HIVE_METASTORE_DB_USER:-hive} -d ${HIVE_METASTORE_DB_NAME:-hive_metastore}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: apache/hive:4.0.1
    container_name: hive-metastore
    hostname: hive-metastore
    restart: always
    entrypoint: sh -c "if [ ! -f /opt/hive/lib/postgresql.jar ]; then wget -q -O /opt/hive/lib/postgresql.jar https://jdbc.postgresql.org/download/postgresql-42.7.5.jar; fi && /entrypoint.sh"
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      TZ: Asia/Seoul
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/${HIVE_METASTORE_DB_NAME:-hive_metastore}
        -Djavax.jdo.option.ConnectionUserName=${HIVE_METASTORE_DB_USER:-hive}
        -Djavax.jdo.option.ConnectionPassword=${HIVE_METASTORE_DB_PASSWORD:-hive}
    volumes:
      - ./config/core-site.xml:/opt/hive/conf/core-site.xml
      - ./config/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml
    networks:
      - infra-public
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9083 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  hive-server:
    image: apache/hive:4.0.1
    container_name: hive-server
    hostname: hive-server
    restart: always
    depends_on:
      hive-metastore:
        condition: service_healthy
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      TZ: Asia/Seoul
      SERVICE_NAME: hiveserver2
      HIVE_SERVER2_THRIFT_PORT: 10000
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
      IS_RESUME: "true"
    volumes:
      - ./config/core-site.xml:/opt/hive/conf/core-site.xml
      - ./config/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml
      - ./scripts/init-hive.sql:/scripts/init-hive.sql:ro
    networks:
      - infra-public
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 10000 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  hadoop-namenode-data:
  hadoop-datanode-data:
  hive-metastore-db-data:

networks:
  infra-public:
    external: true

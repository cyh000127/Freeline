services:
  k6-manager:
    image: grafana/k6:latest
    container_name: k6-manager
    restart: always
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./scripts:/scripts:ro
      - ./output:/output
    environment:
      - TZ=Asia/Seoul
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/prometheus/api/v1/write
      - K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=true
    networks:
      - infra-public

networks:
  infra-public:
    external: true

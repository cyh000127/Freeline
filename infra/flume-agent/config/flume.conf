# Flume Agent: action log -> HDFS
agent.sources = action-log-source
agent.channels = memory-channel
agent.sinks = hdfs-sink

# Source: spooldir (completed rolling log files)
agent.sources.action-log-source.type = spooldir
agent.sources.action-log-source.spoolDir = /var/log/action/spool
agent.sources.action-log-source.fileSuffix = .DONE
agent.sources.action-log-source.fileHeader = true
agent.sources.action-log-source.fileHeaderKey = filename
agent.sources.action-log-source.channels = memory-channel

# Channel: memory
agent.channels.memory-channel.type = memory
agent.channels.memory-channel.capacity = 10000
agent.channels.memory-channel.transactionCapacity = 1000

# Sink: HDFS (hourly partitioned)
agent.sinks.hdfs-sink.type = hdfs
agent.sinks.hdfs-sink.hdfs.path = hdfs://namenode:9000/data/logs/action/%Y-%m-%d/%H
agent.sinks.hdfs-sink.hdfs.filePrefix = action
agent.sinks.hdfs-sink.hdfs.fileSuffix = .log
agent.sinks.hdfs-sink.hdfs.fileType = DataStream
agent.sinks.hdfs-sink.hdfs.writeFormat = Text
agent.sinks.hdfs-sink.hdfs.rollInterval = 3600
agent.sinks.hdfs-sink.hdfs.rollSize = 67108864
agent.sinks.hdfs-sink.hdfs.rollCount = 0
agent.sinks.hdfs-sink.hdfs.useLocalTimeStamp = true
agent.sinks.hdfs-sink.channel = memory-channel
